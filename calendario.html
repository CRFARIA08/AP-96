<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calendário AP-96</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
}

h1{
  margin-bottom:10px;
}

.top-buttons{
  margin:20px 0;
}

.btn{
  display:inline-block;
  margin:5px;
  padding:12px 20px;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
}

.btn-airbnb{
  background:#22c55e;
  color:white;
}

.btn-back{
  border:1px solid white;
  color:white;
}

.status{
  margin-top:20px;
  font-size:14px;
  opacity:0.8;
}

.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:30px;
}

.day{
  padding:12px;
  border-radius:8px;
  background:#1e293b;
}

.blocked{
  background:#ef4444;
}

.today{
  border:2px solid #22c55e;
}
</style>
</head>

<body>

<div class="container">
  <h1>📅 Calendário AP-96</h1>
  <p>Consulte os períodos já ocupados antes de reservar</p>

  <div class="top-buttons">
    <a class="btn btn-airbnb" href="https://www.airbnb.com.br/rooms/1145134548647828331" target="_blank">
      Reservar Agora
    </a>

    <a class="btn btn-back" href="/">
      Voltar ao site
    </a>
  </div>

  <div id="status" class="status">Carregando calendário...</div>

  <div id="calendar" class="grid"></div>
</div>

<script>

const ICS_URL = "https://script.google.com/macros/s/AKfycbxd-IH43mCezB3n2JG7TSRDLgT0Imrmb5ijPE63CxubOUkrVEd-sFffxVp-Icubz9-R/exec?formato=ics";

async function carregarCalendario(){
  try{
    const res = await fetch(ICS_URL);
    const text = await res.text();

    const eventos = [];
    const linhas = text.split("\n");

    let atual = {};

    linhas.forEach(linha=>{
      if(linha.startsWith("BEGIN:VEVENT")){
        atual = {};
      }
      if(linha.startsWith("DTSTART")){
        atual.start = linha.split(":")[1];
      }
      if(linha.startsWith("DTEND")){
        atual.end = linha.split(":")[1];
      }
      if(linha.startsWith("END:VEVENT")){
        eventos.push(atual);
      }
    });

    montarCalendario(eventos);

    document.getElementById("status").innerText = "✅ Atualizado automaticamente";

  }catch(e){
    document.getElementById("status").innerText =
      "⚠️ Não foi possível carregar o calendário agora";
  }
}

function montarCalendario(eventos){
  const container = document.getElementById("calendar");
  container.innerHTML = "";

  const hoje = new Date();
  const ano = hoje.getFullYear();
  const mes = hoje.getMonth();

  const diasMes = new Date(ano, mes+1, 0).getDate();

  for(let d=1; d<=diasMes; d++){
    const data = new Date(ano, mes, d);

    const div = document.createElement("div");
    div.classList.add("day");

    const dataStr = formatar(data);

    if(isBlocked(dataStr, eventos)){
      div.classList.add("blocked");
    }

    if(isHoje(data)){
      div.classList.add("today");
    }

    div.innerText = d;
    container.appendChild(div);
  }
}

function isBlocked(data, eventos){
  return eventos.some(ev=>{
    return data >= ev.start && data < ev.end;
  });
}

function formatar(date){
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,"0");
  const d = String(date.getDate()).padStart(2,"0");
  return `${y}${m}${d}`;
}

function isHoje(d){
  const hoje = new Date();
  return d.toDateString() === hoje.toDateString();
}

carregarCalendario();

</script>

</body>
</html>
