<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Check-in Hóspedes | AP-96</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
margin:0;
padding:0;
}

.container{
max-width:520px;
margin:auto;
padding:20px;
}

.card{

background:#f1f5f9;
padding:25px;
border-radius:14px;
box-shadow:0 10px 35px rgba(0,0,0,0.25);

}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:140px;
}

h1{
text-align:center;
font-size:20px;
margin-bottom:10px;
color:#1e293b;
}

p{
font-size:14px;
text-align:center;
color:#475569;
margin-bottom:20px;
}

.section{
margin-top:20px;
}

.section h2{
font-size:16px;
border-bottom:1px solid #cbd5e1;
padding-bottom:6px;
margin-bottom:15px;
color:#1e293b;
}

.hospede{
margin-bottom:15px;
padding-bottom:10px;
border-bottom:1px dashed #cbd5e1;
}

.row{
display:flex;
gap:8px;
}

.row input{
flex:1;
}

input{

width:100%;
padding:10px;
margin-bottom:8px;
border-radius:6px;
border:1px solid #cbd5e1;
font-size:14px;

}

button{

width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:#22c55e;
font-size:16px;
color:white;
cursor:pointer;

}

button:hover{
background:#16a34a;
}

.add{

background:#3b82f6;
margin-top:5px;

}

.add:hover{
background:#2563eb;
}

.footer{

font-size:12px;
margin-top:20px;
text-align:center;
color:#64748b;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

<img src="logo.png">

</div>

<div class="card">

<h1>Cadastro de Hóspedes</h1>

<p>
Para garantir uma entrada tranquila, precisamos do nome e documento de cada hóspede.
Crianças abaixo de 8 anos somente nome e idade.
</p>

<div class="section">

<h2>Hóspedes</h2>

<div id="hospedes"></div>

<button class="add" onclick="addHospede()">+ Adicionar hóspede</button>

</div>

<div class="section">

<h2>Carro</h2>

<input id="modelo" placeholder="Modelo do carro">

<div class="row">
<input id="cor" placeholder="Cor">
<input id="placa" placeholder="Placa">
</div>

</div>

<button onclick="enviar()">Enviar Cadastro</button>

<div class="footer">

As informações devem ser iguais às informadas no Airbnb.  
Não é permitido receber visitas no apartamento.

</div>

</div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxTj02KeSr75Ogisjz60gWlt_vNtQR1sTJpe3-sUriNCxEEBUWK6RAHZsqSAVQyEGTH/exec"

let totalHospedes=0

function gerarID(){

let hoje=new Date()

let data=
hoje.getFullYear()+
("0"+(hoje.getMonth()+1)).slice(-2)+
("0"+hoje.getDate()).slice(-2)

let random=Math.floor(Math.random()*9000)+1000

return "AP96-"+data+"-"+random

}

function addHospede(){

if(totalHospedes>=6){
alert("Máximo de 6 hóspedes")
return
}

totalHospedes++

let div=document.createElement("div")

div.className="hospede"

div.innerHTML=`

<input placeholder="${totalHospedes}º Nome" id="nome${totalHospedes}">

<div class="row">

<input placeholder="CPF" id="cpf${totalHospedes}">
<input placeholder="RG" id="rg${totalHospedes}">

</div>

`

document.getElementById("hospedes").appendChild(div)

}

function enviar(){

let idReserva=gerarID()

let hospedes=[]

for(let i=1;i<=totalHospedes;i++){

let nome=document.getElementById("nome"+i)?.value||""
let cpf=document.getElementById("cpf"+i)?.value||""
let rg=document.getElementById("rg"+i)?.value||""

if(nome!=""){

hospedes.push({

nome:nome,
cpf:cpf,
rg:rg

})

}

}

let dados={

id:idReserva,
hospedes:hospedes,
modelo:document.getElementById("modelo").value,
cor:document.getElementById("cor").value,
placa:document.getElementById("placa").value

}

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify(dados)
})
.then(res=>res.json())
.then(()=>{

alert("Cadastro enviado com sucesso!")

resetForm()

})

}

function resetForm(){

document.getElementById("hospedes").innerHTML=""

document.getElementById("modelo").value=""
document.getElementById("cor").value=""
document.getElementById("placa").value=""

totalHospedes=0

addHospede()

}

addHospede()

</script>

</body>

</html>
